<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  
  <!-- Incident/Alert symbol - circular monitor with pulse indicator -->
  <circle cx="16" cy="16" r="10" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
  
  <!-- Inner indicator circle (represents active incident) -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#4f46e5" stroke-width="1"/>
  
  <!-- Center pulse dot -->
  <circle cx="16" cy="16" r="2.5" fill="#4f46e5"/>
  
  <!-- Outer accent ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.6"/>
</svg>
